<div class="page">
  <div class="page-header">
    <h2>Add Vendor</h2>
    <a routerLink="/vendors">Back to Vendors</a>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="field">
      <label for="name">Name</label>
      <input id="name" formControlName="name" placeholder="Vendor name" />
      <div class="field-error" *ngIf="form.controls.name.touched && form.controls.name.invalid">
        Name is required.
      </div>
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input id="email" formControlName="email" placeholder="vendor@email.com" />
      <div class="field-error" *ngIf="form.controls.email.touched && form.controls.email.invalid">
        Enter a valid email.
      </div>
    </div>

    <div class="field">
      <label for="phone">Phone</label>
      <input id="phone" formControlName="phone" placeholder="+1 555 123 4567" />
    </div>

    <div class="field">
      <label>
        <input type="checkbox" formControlName="isGlobal" />
        Global vendor (available across projects)
      </label>
    </div>

    <div class="status error" *ngIf="error()">{{ error() }}</div>

    <button type="submit" [disabled]="saving() || form.invalid">
      {{ saving() ? 'Saving...' : 'Create Vendor' }}
    </button>
  </form>
</div>
